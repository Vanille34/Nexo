<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modifier Profil - Nexo</title>
<link rel="stylesheet" href="style.css">

<style>

.container{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.profile-box{
display:flex;
flex-direction:column;
align-items:center;
width:90%;
max-width:350px;
background:#1c1c1c;
padding:20px;
border-radius:15px;
}

.profile-box input,
.profile-box textarea{
width:90%;
margin-bottom:10px;
padding:8px;
border-radius:10px;
border:2px solid #ff2d55;
background:#1c1c1c;
color:white;
}

.profile-box button{
width:80%;
margin-top:5px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.profile-box button.primary{
background:#FF2D55;
color:white;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
border:2px solid #ff2d55;
margin-bottom:10px;
}

.stats-box{
display:flex;
justify-content:space-between;
width:90%;
max-width:350px;
margin:15px 0;
background:#111;
padding:12px;
border-radius:12px;
border:1px solid #ff2d55;
}

.stats-item{
display:flex;
flex-direction:column;
align-items:center;
}

.stats-item .number{
font-weight:bold;
font-size:18px;
color:#ff2d55;
}

.stats-item .label{
font-size:12px;
color:#cfcfcf;
}

/* POSTS */

.posts-box{
width:90%;
max-width:350px;
background:#111;
padding:15px;
border-radius:15px;
border:1px solid #ff2d55;
margin-bottom:30px;
}

.posts-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:10px;
}

.post-item{
position:relative;
overflow:hidden;
}

.post-item img{
width:100%;
height:90px;
object-fit:cover;
border-radius:8px;
}

/* LIKE */

.like-btn{
position:absolute;
bottom:6px;
left:6px;
font-size:13px;
cursor:pointer;
user-select:none;
background:rgba(0,0,0,0.5);
padding:4px 6px;
border-radius:8px;
transition:all 0.2s ease;
}

.like-btn.liked{
color:#ff2d55;
}

/* DELETE */

.delete-btn{
position:absolute;
top:6px;
right:6px;
width:26px;
height:26px;
border-radius:8px;
border:none;
background:rgba(0,0,0,0.5);
color:white;
cursor:pointer;
opacity:0;
transition:0.2s ease;
}

.post-item:hover .delete-btn{
opacity:1;
}

.delete-btn:hover{
background:#ff2d55;
}

</style>
</head>
<body>

<header>
<button onclick="goBack()">⬅ Retour</button>
<div>Modifier Profil</div>
</header>

<div class="container">

<div class="profile-box">
<img id="profileAvatar" src="avatar.png" class="avatar">
<input type="text" id="pseudo" placeholder="Pseudo">
<input type="number" id="age" placeholder="Âge">
<textarea id="bio" rows="3" placeholder="Bio"></textarea>
<button class="primary" onclick="saveProfile()">Sauvegarder</button>
</div>

<div class="stats-box">

<div class="stats-item">
<div class="number" id="followersCount">0</div>
<div class="label">Abonnés</div>
</div>

<div class="stats-item">
<div class="number" id="likesCount">0</div>
<div class="label">Likes</div>
</div>

<div class="stats-item">
<div class="number" id="followingCount">0</div>
<div class="label">Abonnements</div>
</div>

</div>

<div class="posts-box">
<h3 style="color:#ff2d55;">Publications</h3>
<input type="file" id="photoInput" accept="image/*">
<button class="primary" onclick="addPhoto()">Ajouter</button>
<div class="posts-grid" id="postsGrid"></div>
</div>

</div>

<script>

const currentUser = localStorage.getItem("currentUser");
if(!currentUser) window.location.href="login.html";

/* PROFIL */

function loadProfile(){
updateStats();
renderPosts();
}

function saveProfile(){
alert("Profil sauvegardé !");
}

/* COMPTEURS */

function updateStats(){

// Abonnements
const subscribed = new Set(JSON.parse(localStorage.getItem("subscribed")) || []);
document.getElementById("followingCount").textContent = subscribed.size;

// Abonnés (stockage simple)
const followers = JSON.parse(localStorage.getItem("followers_" + currentUser)) || [];
document.getElementById("followersCount").textContent = followers.length;

// Likes total
let posts = JSON.parse(localStorage.getItem("posts_" + currentUser)) || [];
let totalLikes = 0;

posts.forEach(post=>{
totalLikes += post.likes;
});

document.getElementById("likesCount").textContent = totalLikes;
}

/* POSTS */

function addPhoto(){

const input = document.getElementById("photoInput");
const file = input.files[0];
if(!file) return;

let posts = JSON.parse(localStorage.getItem("posts_" + currentUser)) || [];

if(posts.length >= 3){
alert("Maximum 3 photos !");
return;
}

const reader = new FileReader();

reader.onload = function(e){
posts.push({
image:e.target.result,
likes:0,
liked:false
});

localStorage.setItem("posts_" + currentUser, JSON.stringify(posts));
input.value="";
renderPosts();
};

reader.readAsDataURL(file);
}

function renderPosts(){

const grid = document.getElementById("postsGrid");
grid.innerHTML="";

let posts = JSON.parse(localStorage.getItem("posts_" + currentUser)) || [];

posts.forEach((post,index)=>{

const div = document.createElement("div");
div.className="post-item";

div.innerHTML=`
<img src="${post.image}">
<button class="delete-btn" onclick="deletePost(${index})">🗑</button>
<div class="like-btn ${post.liked ? 'liked':''}"
onclick="toggleLike(${index})">
❤️ ${post.likes}
</div>
`;

grid.appendChild(div);
});

updateStats();
}

function toggleLike(index){

let posts = JSON.parse(localStorage.getItem("posts_" + currentUser)) || [];

if(posts[index].liked){
posts[index].liked=false;
posts[index].likes--;
}else{
posts[index].liked=true;
posts[index].likes++;
}

localStorage.setItem("posts_" + currentUser, JSON.stringify(posts));
renderPosts();
}

function deletePost(index){

let posts = JSON.parse(localStorage.getItem("posts_" + currentUser)) || [];
posts.splice(index,1);
localStorage.setItem("posts_" + currentUser, JSON.stringify(posts));
renderPosts();
}

function goBack(){
window.location.href="index.html";
}

loadProfile();

</script>

</body>
</html>
